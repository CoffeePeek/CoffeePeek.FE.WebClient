
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoffeePeek</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans:wght@400;500;600;700&family=Sora:wght@400;500;600;700;800&display=swap" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans:wght@400;500;600;700&family=Sora:wght@400;500;600;700;800&display=swap"></noscript>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:wght,FILL@100..700,0..1&display=swap" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:wght,FILL@100..700,0..1&display=swap"></noscript>
    <style>
        @font-face {
            font-family: "RF Dewi Expanded";
            src: url("/fonts/RFDewiExpanded-Ultralight.otf") format("opentype");
            font-weight: 200;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: "RF Dewi Expanded";
            src: url("/fonts/RFDewiExpanded-Light.otf") format("opentype");
            font-weight: 300;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: "RF Dewi Expanded";
            src: url("/fonts/RFDewiExpanded-Regular.otf") format("opentype");
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: "RF Dewi Expanded";
            src: url("/fonts/RFDewiExpanded-Semibold.otf") format("opentype");
            font-weight: 600;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: "RF Dewi Expanded";
            src: url("/fonts/RFDewiExpanded-Bold.otf") format("opentype");
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: "RF Dewi Expanded";
            src: url("/fonts/RFDewiExpanded-Ultrabold.otf") format("opentype");
            font-weight: 800;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: "RF Dewi Expanded";
            src: url("/fonts/RFDewiExpanded-Black.otf") format("opentype");
            font-weight: 900;
            font-style: normal;
            font-display: swap;
        }
        body {
            font-family: 'Noto Sans', 'Inter', sans-serif;
            background-color: #1A1412;
            color: #FFFFFF;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        /* Desktop background texture */
        .bg-pattern {
            background-image: radial-gradient(#2D241F 1px, transparent 1px);
            background-size: 40px 40px;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1A1412;
        }
        ::-webkit-scrollbar-thumb {
            background: #3D2F28;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4D3D33;
        }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
